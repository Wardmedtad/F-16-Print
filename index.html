<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>F-16 Hub (GitHub Version)</title>
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    :root { --primary: #1d1d1f; --bg: #f5f5f7; --surface: #ffffff; --border: #d2d2d7; }
    body { background-color: var(--bg); color: var(--primary); font-size: 13px; font-family: 'SF Pro Display', sans-serif; }
    .card, .tab-content { background: var(--surface); border-radius: 18px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); border: none; padding: 24px; }
    .tab-content { display: none !important; } .tab-content.active { display: block !important; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    .nav-tabs { background: #e5e5ea; padding: 4px; border-radius: 12px; border: none; display: inline-flex; gap: 4px; margin-bottom: 20px; }
    .tab-btn { background: transparent; border: none; border-radius: 8px; padding: 6px 16px; font-weight: 500; }
    .tab-btn.active { background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-weight: 600; }
    .btn { font-size: 12px; border-radius: 20px; font-weight: 500; }
    .form-control, .form-select { font-size: 13px; border-radius: 8px; border: 1px solid var(--border); padding: 10px; }
    .top-header { background: var(--surface); padding: 16px 24px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .apple-login-container { max-width: 380px; margin: 80px auto; text-align: center; padding: 40px 30px; background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
  </style>
</head>
<body>
  <audio id="ding" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <div class="container-fluid py-4" style="max-width: 1400px;">
    
    <!-- 🔒 หน้าจอ Login แยกสาขา สไตล์ Apple -->
    <div id="loginBox" class="apple-login-container" style="display:block;">
      <h3 class="fw-bold mb-4">F-16 Hub</h3>
      <input type="text" id="branchCodeInput" class="form-control mb-3 text-center" placeholder="รหัสสาขา (Branch Code)">
      <input type="password" id="staffIdInput" class="form-control mb-4 text-center" placeholder="รหัสผู้ใช้งาน (Staff ID)">
      <button id="loginBtn" class="btn btn-dark w-100 py-2 fs-6" onclick="login()">Sign In</button>
    </div>

    <!-- 🔓 หน้าจอแดชบอร์ดหลัก -->
    <div id="main" style="display:none;">
      <div class="top-header">
        <h4 class="m-0 fw-bold"><i class="bi bi-display"></i> F-16 Dashboard <span class="badge bg-success fs-6 ms-2">GitHub Mode</span></h4>
        <div class="d-flex gap-2 align-items-center">
          <button id="mainRefreshBtn" class="btn btn-outline-dark" onclick="refreshDataLogic()"><i class="bi bi-arrow-clockwise"></i> รีเฟรช</button>
          <button class="btn btn-danger" onclick="logoutAndClear()">LOG OUT</button>
          <span id="branchBadge" class="badge bg-light text-dark border p-2 fs-6"></span>
        </div>
      </div>

      <ul class="nav nav-tabs">
        <button class="tab-btn active" onclick="switchTab('queueTab', this)">คิวหน้าร้าน</button>
        <button class="tab-btn" onclick="switchTab('transferTab', this)">Transfer</button>
        <button class="tab-btn" onclick="switchTab('resTab', this)">สินค้าจอง</button>
        <button class="tab-btn" onclick="switchTab('lossTab', this)">Loss Lens</button>
      </ul>

      <div id="queueTab" class="tab-content active"><div id="list" class="table-responsive"></div></div>
      <div id="transferTab" class="tab-content"><div id="transferTableContainer" class="table-responsive"><p class="text-center py-4 text-muted">ไม่มีรายการ Transfer</p></div></div>
      <div id="resTab" class="tab-content"><div id="resDashBody" class="table-responsive"><p class="text-center py-4 text-muted">ไม่มีข้อมูลใบจอง</p></div></div>

      <div id="lossTab" class="tab-content">
        <div class="d-flex justify-content-between mb-4">
          <h5 class="fw-bold m-0">📊 ประวัติบันทึก Loss Lens</h5>
          <button class="btn btn-dark" onclick="forcePrintLastLoss()">รีปริ้นรายการล่าสุด</button>
        </div>
        <div id="lossHistoryList" class="table-responsive bg-white rounded p-2"></div>
      </div>
    </div> 

  </div>

  <script>
    // 🔗 🔴 เปลี่ยนเป็นลิงก์ Web App ตัวล่าสุดจากหน้า Apps Script ของพี่
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyV0QpVn57ylj4nZ-dMoByFXcVXPB3gxsW159mVex7fdk7IMye7y3CdsiIX0tswIEtL/exec"; 
    
    let currentLossRawData = [];
    let globalLossPrintData = []; 
    let currentQueueData = [];
    let MY_BRANCH = "";

    let storedQueue = localStorage.getItem('printedQueueIds') || '[]';
    let printedQueueIds = new Set(JSON.parse(storedQueue));

    document.addEventListener("DOMContentLoaded", function() {
      // ดักจับการ Login แยกสาขาทาง URL ลัด เช่น ?branch=206
      const urlParams = new URLSearchParams(window.location.search);
      const branchFromUrl = urlParams.get('branch');
      if (branchFromUrl) {
        localStorage.setItem('f16_branch_code', branchFromUrl.trim().toUpperCase());
        localStorage.setItem('owndays_staff', 'Auto Login');
      }

      checkAuth();
    });

    function checkAuth() {
      MY_BRANCH = localStorage.getItem('f16_branch_code');
      let cachedStaff = localStorage.getItem('owndays_staff');

      if (MY_BRANCH && cachedStaff) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.getElementById("branchBadge").textContent = `สตาฟ: ${cachedStaff} (${MY_BRANCH})`;
        
        refreshDataLogic();
        setInterval(refreshDataLogic, 5000); // เช็คคิวอัตโนมัติเพื่อสั่งออโต้ปริ้นทุก 5 วินาที
      } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("main").style.display = "none";
      }
    }

    async function login() {
      const b = document.getElementById("branchCodeInput").value.trim();
      const s = document.getElementById("staffIdInput").value.trim();
      if(!b || !s) { alert("กรุณากรอกข้อมูลให้ครบครับ"); return; }

      const btn = document.getElementById("loginBtn");
      btn.innerHTML = "กำลังตรวจสอบ... ⏳";
      btn.disabled = true;

      try {
        const response = await fetch(GOOGLE_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ action: 'verifyStaffById', branch: b, staffId: s })
        });
        const res = await response.json();
        if (res && res.status === "success") {
          localStorage.setItem('f16_branch_code', b.toUpperCase());
          localStorage.setItem('owndays_staff', res.staffName);
          checkAuth();
        } else {
          alert(res ? res.message : "ไม่พบรหัสผู้ใช้งานนี้ในระบบ");
          btn.innerHTML = "Sign In";
          btn.disabled = false;
        }
      } catch (e) {
        alert("กรุณาเปิดสิทธิ์ Insecure Content ในเบราว์เซอร์ก่อนใช้งานครับ");
        btn.innerHTML = "Sign In";
        btn.disabled = false;
      }
    }

    function logoutAndClear() {
      if(confirm("ออกจากระบบ?")) {
        localStorage.removeItem('f16_branch_code');
        localStorage.removeItem('owndays_staff');
        location.reload();
      }
    }
    
    function switchTab(tabId, btn) { 
        document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active')); 
        document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active')); 
        document.getElementById(tabId).classList.add('active'); 
        btn.classList.add('active'); 
    }

    // 🌐 ยิงผ่านท่อดึงข้อมูลแบบไดนามิก ป้องกันค้าง 100%
    async function refreshDataLogic() {
      try {
        const response = await fetch(GOOGLE_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ branch: MY_BRANCH, action: 'getData' })
        });
        const d = await response.json();
        if (d && d.success) {
          currentQueueData = d.queue || [];
          currentLossRawData = d.lossPrintJob || [];
          
          // ตรวจสอบคิวใหม่เพื่อสั่งออโต้ปริ้น
          currentQueueData.forEach(i => { 
              if(!printedQueueIds.has(i.queueId)){ 
                  printedQueueIds.add(i.queueId); 
                  manualPrint(i); 
                  localStorage.setItem("printedQueueIds", JSON.stringify([...printedQueueIds])); 
                  document.getElementById("ding").play().catch(()=>{}); 
              } 
          });

          renderQueueTable(currentQueueData);
          renderLossTable(currentLossRawData);
        }
      } catch (e) { console.error("API Error:", e); }
    }

    function renderQueueTable(list) {
      const div = document.getElementById("list");
      if(!list.length){ div.innerHTML = `<p class="text-center py-4 text-muted">ไม่มีคิวหน้าร้านสำหรับสาขานี้</p>`; return; }
      
      let html = `<table class="table align-middle"><thead class="table-light"><tr><th>คิว</th><th>ลูกค้า</th><th>รุ่น</th><th>บริการ</th><th>สถานะ</th></tr></thead><tbody>`;
      html += list.map(i => {
        return `<tr><td class="fw-bold fs-4">${i.queueNumber}</td><td><b>${i.name}</b><br><small>${i.phone}</small></td><td>${i.model}</td><td>${i.service}</td><td><span class="badge bg-danger">${i.status}</span></td></tr>`;
      }).join("");
      html += `</tbody></table>`;
      div.innerHTML = html;
    }

    function renderLossTable(data) { 
        const container = document.getElementById('lossHistoryList'); 
        if(!container || !data.length) { container.innerHTML = '<p class="text-center py-4 text-muted">ไม่มีประวัติ Loss Lens ของสาขาในชีต</p>'; return; }; 
        
        globalLossPrintData = [...data].reverse(); 
        let html = `<table class="table table-hover align-middle"><thead class="table-light"><tr><th>CASE NO.</th><th>Customer ID</th><th>Claim Date</th><th>Reason</th><th>Lens Type</th><th class="text-center">สั่งพิมพ์ออก Epson</th></tr></thead><tbody>`;
        
        globalLossPrintData.forEach((i, index) => {
            html += `<tr>
                <td class="fw-bold text-danger">${i.caseNo}</td>
                <td>${i.customerId}</td>
                <td>${i.claimDate}</td>
                <td><span class="badge bg-danger">${i.reason}</span></td>
                <td class="text-primary fw-bold">${i.lensType}</td>
                <td class="text-center">
                    <button class="btn btn-primary rounded-pill px-3" onclick="printLossLensSlip(${index})">
                        <i class="bi bi-printer"></i> กดพิมพ์
                    </button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function manualPrint(i) {
      const printerIp = "192.168.1.201"; 
      const printerUrl = "http://" + printerIp + "/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000";
      let serviceArr = (i.service || '-').split(',').map(s => s.trim()).filter(Boolean); 
      let servicesText = serviceArr.map(s => `  - ${s}`).join('\n');
      const timeStr = i.pickupTime ? new Date(i.pickupTime).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : "-";

      let requestBody = '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">';
      requestBody += '<align align="center"/><text font="font_a" width="2" height="2">OWNDAYS\n</text>';
      requestBody += `<text font="font_a" width="3" height="3">${i.queueNumber}\n\n</text>`;
      requestBody += `<text font="font_a" width="1" height="1">นัดรับแว่นเวลา ${timeStr} น.\n</text>`;
      requestBody += '<align align="left"/>';
      requestBody += `<text font="font_a" width="1" height="1">ชื่อลูกค้า: คุณ ${i.name || '-'}\n</text>`;
      requestBody += `<text font="font_a" width="1" height="1">รุ่นแว่น: ${i.model || '-'}\n</text>`;
      requestBody += `<text font="font_a" width="1" height="1">บริการ:\n${servicesText}\n</text>`;
      requestBody += '<cut type="feed"/></epos-print>';

      fetch(printerUrl, { method: 'POST', headers: { 'Content-Type': 'text/xml; charset=utf-8' }, body: requestBody }).catch(e => console.error(e));
    }

    function printLossLensSlip(index) {
      const data = globalLossPrintData[index];
      if(!data) return;

      const printerIp = "192.168.1.201"; 
      const printerUrl = "http://" + printerIp + "/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000";

      let requestBody = '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">';
      requestBody += '<align align="center"/>';
      requestBody += '<text font="font_a" width="1" height="2">' + (data.reason || 'LOSS LENS') + '\n</text>';
      requestBody += '<text font="font_a" width="2" height="2">' + (data.caseNo || '-') + '\n\n</text>';
      requestBody += '<align align="left"/>';
      requestBody += '<text font="font_a" width="1" height="1">Customer ID: ' + (data.customerId || '-') + '\n</text>';
      requestBody += '<text font="font_a" width="1" height="1">Lens Type: ' + (data.lensType || '-') + '\n</text>';
      requestBody += '<cut type="feed"/></epos-print>';

      fetch(printerUrl, { method: 'POST', headers: { 'Content-Type': 'text/xml; charset=utf-8' }, body: requestBody }).catch(e => console.error(e));
    }
    
    function forcePrintLastLoss() { if(globalLossPrintData.length > 0) printLossLensSlip(0); }
  </script>
</body>
</html>
