<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>F-16 Hub (GitHub Version)</title>
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    :root { --primary: #1d1d1f; --bg: #f5f5f7; --surface: #ffffff; --border: #d2d2d7; }
    body { background-color: var(--bg); color: var(--primary); font-size: 13px; font-family: 'SF Pro Display', sans-serif; }
    .tab-content { background: var(--surface); border-radius: 18px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); border: none; padding: 24px; display: none !important; }
    .tab-content.active { display: block !important; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    .nav-tabs { background: #e5e5ea; padding: 4px; border-radius: 12px; border: none; display: inline-flex; gap: 4px; margin-bottom: 20px; }
    .tab-btn { background: transparent; border: none; border-radius: 8px; padding: 6px 16px; font-weight: 500; }
    .tab-btn.active { background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-weight: 600; }
    .btn { font-size: 12px; border-radius: 20px; font-weight: 500; }
    .top-header { background: var(--surface); padding: 16px 24px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="container-fluid py-4" style="max-width: 1400px;">
    <div id="main" style="display:block;">
      
      <div class="top-header">
        <h4 class="m-0 fw-bold"><i class="bi bi-display"></i> F-16 Dashboard <span class="badge bg-success fs-6 ms-2">GitHub Mode</span></h4>
        <div class="d-flex gap-2 align-items-center">
          <button id="mainRefreshBtn" class="btn btn-outline-dark" onclick="refreshDataLogic()"><i class="bi bi-arrow-clockwise"></i> รีเฟรช</button>
          <span id="branchBadge" class="badge bg-light text-dark border p-2 fs-6">กำลังดึงข้อมูลสาขา...</span>
        </div>
      </div>

      <ul class="nav nav-tabs">
        <button class="tab-btn active" onclick="switchTab('queueTab', this)">คิวหน้าร้าน</button>
        <button class="tab-btn" onclick="switchTab('transferTab', this)">Transfer</button>
        <button class="tab-btn" onclick="switchTab('resTab', this)">สินค้าจอง</button>
        <button class="tab-btn" onclick="switchTab('lossTab', this)">Loss Lens</button>
      </ul>

      <div id="queueTab" class="tab-content active"><div id="list" class="table-responsive"></div></div>
      <div id="transferTab" class="tab-content"><div id="transferTableContainer" class="table-responsive"></div></div>
      <div id="resTab" class="tab-content"><div id="resDashBody" class="table-responsive"></div></div>

      <div id="lossTab" class="tab-content">
        <div class="d-flex justify-content-between mb-4">
          <h5 class="fw-bold m-0">📊 ประวัติบันทึก Loss Lens</h5>
          <button class="btn btn-dark" onclick="forcePrintLastLoss()">รีปริ้นรายการล่าสุด</button>
        </div>
        <div id="lossHistoryList" class="table-responsive bg-white rounded p-2"></div>
      </div>

    </div> 
  </div>

  <script>
    // 🔗 🟢 ซ่อมสัญลักษณ์ท่อเชื่อม API และใช้เป็นฐานส่งข้อมูล JSON
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyV0QpVn57ylj4nZ-dMoByFXcVXPB3gxsW159mVex7fdk7IMye7y3CdsiIX0tswIEtL/exec"; 
    
    let currentLossRawData = [];
    let globalLossPrintData = []; 
    let currentQueueData = [];
    let MY_BRANCH = "206"; // ค่าเริ่มต้นกรณีตรวจไม่เจอ

    // 🚀 ฟังก์ชันจัดการระบบออโต้ล็อกอินแยกสาขาอัตโนมัติเมื่อเปิดหน้าจอ
    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const branchFromUrl = urlParams.get('branch');
      
      if (branchFromUrl) {
        localStorage.setItem('f16_branch_code', branchFromUrl.trim().toUpperCase());
      }
      
      MY_BRANCH = localStorage.getItem('f16_branch_code') || "206";
      document.getElementById("branchBadge").textContent = `บอร์ดหน้าร้าน (${MY_BRANCH})`;

      refreshDataLogic();
      setInterval(refreshDataLogic, 5000); // ออโต้รีเฟรชเช็คคิวและสั่งพิมพ์ทุก 5 วินาที
    });
    
    function switchTab(tabId, btn) { 
        document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active')); 
        document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active')); 
        document.getElementById(tabId).classList.add('active'); 
        btn.classList.add('active'); 
    }

    // 🌐 ดึงข้อมูลแยกตามสาขาประจำเครื่องแบบไดนามิก ไม่ล็อกตายตัว
    async function refreshDataLogic() {
      try {
        const response = await fetch(GOOGLE_API_URL, {
          method: 'POST',
          body: JSON.stringify({ branch: MY_BRANCH, action: "getData" })
        });
        const d = await response.json();
        if (d && d.success) {
          currentQueueData = d.queue || [];
          currentLossRawData = d.lossPrintJob || [];
          
          renderQueueTable(currentQueueData);
          renderLossTable(currentLossRawData);
        }
      } catch (e) { console.error("API Error:", e); }
    }

    function renderQueueTable(list) {
      const div = document.getElementById("list");
      if(!list.length){ div.innerHTML = `<p class="text-center py-4">ไม่มีคิว</p>`; return; }
      div.innerHTML = `<table class="table"><thead><tr><th>คิว</th><th>ลูกค้า</th><th>รุ่น</th><th>บริการ</th><th>สถานะ</th></tr></thead><tbody>` + 
        list.map(i => `<tr><td class="fw-bold fs-5">${i.queueNumber}</td><td><b>${i.name}</b></td><td>${i.model}</td><td>${i.service}</td><td><span class="badge bg-danger">${i.status}</span></td></tr>`).join("") + `</tbody></table>`;
    }

    function renderLossTable(data) { 
        const container = document.getElementById('lossHistoryList'); 
        if(!container || !data.length) { container.innerHTML = '<p class="text-center py-4">ไม่มีข้อมูล</p>'; return; }; 
        
        globalLossPrintData = [...data].reverse(); 
        let html = `<table class="table table-hover align-middle"><thead class="table-light"><tr><th>CASE NO.</th><th>Customer ID</th><th>Claim Date</th><th>Reason</th><th>Lens Type</th><th class="text-center">สั่งพิมพ์ออก Epson</th></tr></thead><tbody>`;
        
        globalLossPrintData.forEach((i, index) => {
            html += `<tr>
                <td class="fw-bold text-danger">${i.caseNo}</td>
                <td>${i.customerId}</td>
                <td>${i.claimDate}</td>
                <td><span class="badge bg-danger">${i.reason}</span></td>
                <td class="text-primary fw-bold">${i.lensType}</td>
                <td class="text-center">
                    <button class="btn btn-primary rounded-pill px-3" onclick="printLossLensSlip(${index})">
                        <i class="bi bi-printer"></i> กดพิมพ์
                    </button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function printLossLensSlip(index) {
      const data = globalLossPrintData[index];
      if(!data) return;

      const printerIp = "192.168.1.201"; 
      const printerUrl = `http://${printerIp}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;

      let requestBody = '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">';
      requestBody += '<align align="center"/>';
      requestBody += `<text font="font_a" width="1" height="2">${data.reason}\n</text>`;
      requestBody += `<text font="font_a" width="2" height="2">${data.caseNo}\n\n</text>`;
      requestBody += '<text font="font_a" width="1" height="1">------------------------------------------\n</text>';
      requestBody += '<align align="left"/>';
      requestBody += `<text font="font_a" width="1" height="1">Customer ID: ${data.customerId}\n</text>';
      requestBody += `<text font="font_a" width="1" height="1">Lens Type: ${data.lensType}\n</text>';
      requestBody += `<text font="font_a" width="1" height="1">Staff ID: ${data.staffId || '-'}\n</text>';
      requestBody += '<align align="center"/><text font="font_a" width="1" height="1">OWNDAYS OPERATION\n</text>';
      requestBody += '<cut type="feed"/>';
      requestBody += '</epos-print>';

      fetch(printerUrl, { method: 'POST', headers: { 'Content-Type': 'text/xml; charset=utf-8' }, body: requestBody })
      .then(() => alert("พิมพ์ใบสลิปออกเครื่อง Epson สำเร็จ!"))
      .catch(e => {
          console.error(e);
          alert("คำสั่งส่งไปแล้วแต่เครื่องไม่พิมพ์ ให้เปิดสิทธิ์ Chrome -> Site Settings -> Insecure Content -> Allow บนโดเมน GitHub ของคุณครับ");
      });
    }
    
    function forcePrintLastLoss() { if(globalLossPrintData.length > 0) printLossLensSlip(0); }
  </script>
</body>
</html>
